# ─────────────────────────────────────────────────────────────────────
# nginx.conf — Mutual TLS Reverse Proxy for the Trading Bot Dashboard
#
# Security model:
#   • TLS 1.2 / 1.3 only (no weak ciphers)
#   • ssl_verify_client optional + HTTP 403 for missing/invalid client cert
#     (returns a proper HTTP 403 rather than a raw TLS alert, which is
#      friendlier for debugging while keeping the same security guarantee)
#   • All traffic to Streamlit is on the internal Docker network only
#   • HTTP on port 80 immediately redirects to HTTPS
#
# Certificate paths are inside the container (mounted read-only):
#   /certs/server.crt  — server TLS certificate
#   /certs/server.key  — server private key
#   /certs/ca.crt      — Root CA that signed the client certificate
# ─────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /tmp/nginx.pid;

events {
    worker_connections 512;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ───────────────────────────────────────────────────────
    log_format main '$remote_addr - "$ssl_client_s_dn" [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" cert_verify=$ssl_client_verify';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    keepalive_timeout  75s;
    gzip               off;   # Streamlit handles its own compression

    # ── mTLS enforcement map ──────────────────────────────────────────
    # Maps $ssl_client_verify to a flag used in the server block.
    # "SUCCESS" = valid client cert presented; anything else = reject.
    map $ssl_client_verify $mtls_valid {
        SUCCESS   1;
        default   0;
    }

    # ── Upstream: Streamlit on internal Docker network ────────────────
    upstream streamlit_backend {
        server trading-bot:8501;
        keepalive 16;
    }

    # ═════════════════════════════════════════════════════════════════
    # SERVER 1 — HTTP → HTTPS permanent redirect
    # ═════════════════════════════════════════════════════════════════
    server {
        listen 80 default_server;
        server_name _;

        # Let Lightsail health-checks through on HTTP without redirect
        location /_health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ═════════════════════════════════════════════════════════════════
    # SERVER 2 — HTTPS with Mutual TLS
    # ═════════════════════════════════════════════════════════════════
    server {
        listen 443 ssl default_server;
        server_name _;

        # ── Server certificate ────────────────────────────────────────
        ssl_certificate     /certs/server.crt;
        ssl_certificate_key /certs/server.key;

        # ── Client certificate verification ───────────────────────────
        # "optional" lets the TLS handshake complete without a cert so
        # Nginx can return a proper HTTP 403 (instead of a raw TLS alert).
        # The $mtls_valid map + return 403 below enforces the requirement.
        ssl_client_certificate /certs/ca.crt;
        ssl_verify_client      optional;
        ssl_verify_depth       2;

        # ── TLS protocol & cipher hardening ───────────────────────────
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;

        # Session resumption (safe with TLS 1.3)
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ── Security headers ──────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options           SAMEORIGIN                             always;
        add_header X-Content-Type-Options    nosniff                                always;
        add_header X-XSS-Protection          "1; mode=block"                        always;
        add_header X-Client-Verify           $ssl_client_verify                     always;

        # ── Enforce mTLS at server level ──────────────────────────────
        # Applied before any location block. If the client did not send a
        # valid certificate, return 403 immediately.
        if ($mtls_valid = 0) {
            return 403;
        }

        # ── Streamlit dashboard proxy ─────────────────────────────────
        location / {
            proxy_pass         http://streamlit_backend;
            proxy_http_version 1.1;

            # WebSocket / SSE upgrade (Streamlit uses ws:// internally)
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # Long timeouts — Streamlit keeps connections open for live updates
            proxy_read_timeout    86400s;
            proxy_send_timeout    86400s;
            proxy_connect_timeout    10s;

            # Buffer tuning for Streamlit's larger initial page payloads
            proxy_buffer_size         128k;
            proxy_buffers             4 256k;
            proxy_busy_buffers_size   256k;
        }

        # ── Streamlit internal endpoints ──────────────────────────────
        location ~* ^/(_stcore|stream|static)/ {
            proxy_pass         http://streamlit_backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_read_timeout 86400s;
        }

        # ── Custom 403 error page ─────────────────────────────────────
        error_page 403 /403.html;
        location = /403.html {
            default_type text/html;
            return 403 '<!DOCTYPE html><html><head><title>403 – Client Certificate Required</title><style>body{font-family:monospace;background:#0f2847;color:#eef2f8;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}div{text-align:center}h1{color:#e74c3c;font-size:2rem}p{color:#a0b4d0}</style></head><body><div><h1>403 Forbidden</h1><p>A valid client certificate is required to access this page.</p><p>Install <strong>client.p12</strong> in your browser and try again.</p></div></body></html>';
        }
    }
}
